model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
web_search = "live"

[projects."/home/aric"]
trust_level = "untrusted"
model = "gpt-5.2"
model_reasoning_effort = "high"
sandbox_mode = "danger-full-access"
approval_policy = "never"

[projects."/home/aric/dev/dyd/core.ws/core"]
trust_level = "trusted"

[projects."/home/aric/dev/dyd/course-exec.ws/exec"]
trust_level = "trusted"

[projects."/home/aric/dev/riff-market"]
trust_level = "trusted"

[projects."/home/aric/.codex"]
trust_level = "trusted"

[projects."/home/aric/dev/dyd/auth-portal.ws/portal"]
trust_level = "trusted"

[projects."/home/aric/.claude"]
trust_level = "untrusted"

[projects."/home/aric/dev/dyd/admin.ws/admin"]
trust_level = "trusted"

[projects."/home/aric/dev/dyd/fort-bend"]
trust_level = "trusted"

[projects."/home/aric/Documents"]
trust_level = "untrusted"

[projects."/home/aric/dev"]
trust_level = "trusted"

[features]
shell_snapshot = true
unified_exec = true
use_linux_sandbox_bwrap = true
multi_agent = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"

[tui]
status_line = [
  "model-name",
  "current-dir",
  "project-root",
  "git-branch",
  "context-used"
]

[mcp_servers.excalidraw]
command = "docker"
args = [
  "run",
  "-i",
  "--rm",
  "--network",
  "host",
  "-e",
  "EXPRESS_SERVER_URL=http://localhost:3000",
  "-e",
  "ENABLE_CANVAS_SYNC=true",
  "ghcr.io/yctimlin/mcp_excalidraw:latest"
]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.next-devtools]
command = "npx"
args = [ "-y", "next-devtools-mcp@latest" ]
